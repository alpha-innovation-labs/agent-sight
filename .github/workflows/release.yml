name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to publish, for example v0.1.3"
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}-${{ inputs.tag || 'dispatch' }}
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate tag and package versions
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      npm_exists: ${{ steps.meta.outputs.npm_exists }}
    steps:
      - name: Resolve tag name
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          VERSION="${TAG#v}"
          PACKAGE_NAME="agent-sight"
          NPM_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "")

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$NPM_VERSION" == "$VERSION" ]]; then
            echo "npm_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "npm_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}

      - name: Validate versions match tag
        shell: bash
        run: |
          set -euo pipefail

          TAG_VERSION="${{ steps.meta.outputs.version }}"
          CARGO_VERSION=$(grep '^version = ' cli/Cargo.toml | head -1 | sed -E 's/version = "([^"]+)"/\1/')
          NPM_VERSION=$(node -p "require('./package.json').version")

          echo "Tag:   ${TAG_VERSION}"
          echo "Cargo: ${CARGO_VERSION}"
          echo "npm:   ${NPM_VERSION}"

          [[ "$CARGO_VERSION" == "$TAG_VERSION" ]] || {
            echo "Cargo version does not match tag" >&2
            exit 1
          }

          [[ "$NPM_VERSION" == "$TAG_VERSION" ]] || {
            echo "npm version does not match tag" >&2
            exit 1
          }

  build-binaries:
    name: Build ${{ matrix.name }}
    needs: validate-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: agent-sight-linux-x64
            use_zigbuild: true
          - name: Linux ARM64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: agent-sight-linux-arm64
            use_zigbuild: true
          - name: Linux musl x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: agent-sight-linux-musl-x64
            use_zigbuild: true
          - name: Linux musl ARM64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary: agent-sight-linux-musl-arm64
            use_zigbuild: true
          - name: Windows x64
            os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            binary: agent-sight-win32-x64.exe
            use_zigbuild: false
          - name: Windows ARM64
            os: ubuntu-latest
            target: aarch64-pc-windows-gnullvm
            binary: agent-sight-win32-arm64.exe
            use_zigbuild: true
          - name: macOS x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            binary: agent-sight-darwin-x64
            use_zigbuild: false
          - name: macOS ARM64
            os: macos-14
            target: aarch64-apple-darwin
            binary: agent-sight-darwin-arm64
            use_zigbuild: false

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-release.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-x86-64-linux-gnu mingw-w64

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild

      - name: Configure Rust linkers
        if: runner.os == 'Linux'
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"

          [target.x86_64-pc-windows-gnu]
          linker = "x86_64-w64-mingw32-gcc"
          EOF

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Build with zigbuild
        if: matrix.use_zigbuild
        run: cargo zigbuild --release --manifest-path cli/Cargo.toml --target ${{ matrix.target }}

      - name: Build with cargo
        if: matrix.use_zigbuild == false
        run: cargo build --release --manifest-path cli/Cargo.toml --target ${{ matrix.target }}

      - name: Copy binary
        shell: bash
        run: |
          mkdir -p artifacts
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            cp cli/target/${{ matrix.target }}/release/agent-sight.exe artifacts/${{ matrix.binary }}
          else
            cp cli/target/${{ matrix.target }}/release/agent-sight artifacts/${{ matrix.binary }}
            chmod +x artifacts/${{ matrix.binary }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: artifacts/${{ matrix.binary }}

  create-release:
    name: Create GitHub release with binaries
    needs:
      - validate-release
      - build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-release.outputs.tag }}

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          FILES=(
            "dist/agent-sight-darwin-arm64/agent-sight-darwin-arm64"
            "dist/agent-sight-darwin-x64/agent-sight-darwin-x64"
            "dist/agent-sight-linux-arm64/agent-sight-linux-arm64"
            "dist/agent-sight-linux-x64/agent-sight-linux-x64"
            "dist/agent-sight-linux-musl-arm64/agent-sight-linux-musl-arm64"
            "dist/agent-sight-linux-musl-x64/agent-sight-linux-musl-x64"
            "dist/agent-sight-win32-arm64.exe/agent-sight-win32-arm64.exe"
            "dist/agent-sight-win32-x64.exe/agent-sight-win32-x64.exe"
          )

          if gh release view "${{ needs.validate-release.outputs.tag }}" >/dev/null 2>&1; then
            gh release upload "${{ needs.validate-release.outputs.tag }}" "${FILES[@]}" --clobber
          else
            gh release create "${{ needs.validate-release.outputs.tag }}" "${FILES[@]}" --generate-notes
          fi

  publish-npm:
    name: Publish npm package
    needs:
      - validate-release
      - build-binaries
      - create-release
    if: needs.validate-release.outputs.npm_exists != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-release.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move binaries to bin directory
        shell: bash
        run: |
          mkdir -p bin
          find artifacts -type f -name 'agent-sight-*' -exec mv {} bin/ \;
          rm -rf artifacts
          chmod +x bin/agent-sight-* 2>/dev/null || true
          ls -la bin/

      - name: Verify all binaries exist
        shell: bash
        run: |
          EXPECTED_BINARIES=(
            "agent-sight-linux-x64"
            "agent-sight-linux-arm64"
            "agent-sight-linux-musl-x64"
            "agent-sight-linux-musl-arm64"
            "agent-sight-win32-x64.exe"
            "agent-sight-win32-arm64.exe"
            "agent-sight-darwin-x64"
            "agent-sight-darwin-arm64"
          )
          for binary in "${EXPECTED_BINARIES[@]}"; do
            if [ ! -f "bin/$binary" ]; then
              echo "Missing bin/$binary"
              exit 1
            fi
          done

      - name: Publish to npm
        run: npm publish --access public --provenance
