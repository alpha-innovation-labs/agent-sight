name: Docs Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Docs Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install docs dependencies
        shell: bash
        run: bun install --cwd docs

      - name: Build static docs for Pages
        shell: bash
        env:
          DOCS_GH_PAGES: "1"
          DOCS_BASE_PATH: ""
        run: |
          set -euo pipefail
          bun run --cwd docs build
          touch docs/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/out

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deploy
        uses: actions/deploy-pages@v4
